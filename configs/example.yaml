# qsource study config — run with:  qsource run configs/example.yaml
#
# Units are user-facing (datasheet language): THz, mm, fractions.
# NOTE: write exponents WITH a sign (0.5e+12) or quoted — PyYAML reads
# `0.5e12` as a string; qsource coerces it anyway, but be aware.

crystal:
  length_mm: 10          # PPKTP-like, 775 nm -> 1550 nm
  kappa_s: 0.207e-9      # GVM pump vs signal, s/m
  kappa_i: -0.318e-9     # GVM pump vs idler, s/m

pump:
  bandwidth_thz: 0.164   # the ideal-purity optimum for this crystal
  # Optional base imperfections (defaults 0 / 1) — useful when sweeping a
  # DIFFERENT parameter on top of an already-imperfect laser:
  # center_jitter_hz: 0
  # rin_frac: 0
  # n_modes: 1
  # mode_spacing_hz: 0

grid:
  n: 192                 # grid points per axis
  span_thz: 4            # half-width of the frequency window
  realizations: 40       # Monte-Carlo realizations K
  seed: 7

sweep:                   # exactly one sweep per run
  parameter: center_jitter_hz   # or: rin_frac | n_modes | mode_spacing_hz
                                #     | bandwidth_hz | length_m
  values: {start: 0, stop: 0.5e+12, points: 9}
  # or an explicit list:  values: [0, 0.1e+12, 0.25e+12, 0.5e+12]

outputs:
  figures: true
  csv: true
