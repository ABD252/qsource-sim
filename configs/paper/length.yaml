pump: {bandwidth_thz: 0.164}
grid: {n: 512, span_thz: 8, realizations: 120, seeds: [7]}
sweep:
  parameter: length_m
  values: [2.000000e-03, 4.000000e-03, 6.000000e-03, 8.000000e-03, 1.000000e-02, 1.200000e-02, 1.400000e-02, 1.600000e-02, 1.800000e-02, 2.000000e-02, 2.200000e-02, 2.400000e-02, 2.600000e-02, 2.800000e-02, 3.000000e-02]
outputs: {figures: true, csv: true}
